  {date:"Jul 19",time:"08:00",home:"TBD",away:"TBD",group:"-",stage:"Bronze Medal",venue:"Miami"},

const STAGE_META = {
  "Group":        {color:"#22c55e",bg:"rgba(34,197,94,0.15)",label:"GS"},
  "Round of 32":  {color:"#60a5fa",bg:"rgba(96,165,250,0.15)",label:"R32"},
  "Round of 16":  {color:"#a78bfa",bg:"rgba(167,139,250,0.15)",label:"R16"},
  "Quarter Final":{color:"#fb923c",bg:"rgba(251,146,60,0.15)",label:"QF"},
  "Semi Final":   {color:"#f87171",bg:"rgba(248,113,113,0.15)",label:"SF"},
  "Bronze Medal": {color:"#a8a29e",bg:"rgba(168,162,158,0.15)",label:"3RD"},
  "Final":        {color:"#fbbf24",bg:"rgba(251,191,36,0.2)",label:"🏆"},
};

const GROUP_COLORS = {
  A:"#ef4444",B:"#f97316",C:"#eab308",D:"#84cc16",
  E:"#22c55e",F:"#14b8a6",G:"#38bdf8",H:"#818cf8",
  I:"#e879f9",J:"#fb7185",K:"#34d399",L:"#fde68a","-":"#6b7280"
};

const STAGES_ORDER = ["All","Group","Round of 32","Round of 16","Quarter Final","Semi Final","Final"];

function App() {
  const [stage, setStage] = useState("All");
  const [search, setSearch] = useState("");

  const filtered = useMemo(() => MATCHES.filter(m => {
    if (stage !== "All" && m.stage !== stage) return false;
    if (search) {
      const s = search.toLowerCase();
      return m.home.toLowerCase().includes(s) || m.away.toLowerCase().includes(s) || m.venue.toLowerCase().includes(s);
    }
    return true;
  }), [stage, search]);

  const byDate = useMemo(() => {
    const map = new Map();
    filtered.forEach(m => {
      if (!map.has(m.date)) map.set(m.date, []);
      map.get(m.date).push(m);
    });
    return map;
  }, [filtered]);

  return (
    <div style={{minHeight:"100vh",background:"#070d09",color:"#e2e8e4",fontFamily:"'Barlow', system-ui, sans-serif",paddingBottom:60}}>

      {/* HEADER */}
      <div style={{background:"linear-gradient(180deg,#0e2414 0%,#070d09 100%)",borderBottom:"1px solid #1a3320",padding:"32px 20px 24px",textAlign:"center",position:"relative",overflow:"hidden"}}>
        <div style={{position:"absolute",inset:0,backgroundImage:"radial-gradient(circle at 50% 0%,rgba(34,197,94,0.08) 0%,transparent 70%)"}}/>
        <div style={{position:"relative"}}>
          <div style={{fontSize:12,letterSpacing:4,color:"#4ade80",textTransform:"uppercase",marginBottom:8,fontFamily:"'Barlow Condensed',sans-serif",fontWeight:600}}>FIFA</div>
          <h1 style={{margin:0,fontSize:"clamp(32px,8vw,56px)",fontFamily:"'Barlow Condensed',sans-serif",fontWeight:800,lineHeight:1,letterSpacing:-1,color:"#fff"}}>WORLD CUP 2026</h1>
          <div style={{fontSize:"clamp(14px,4vw,20px)",fontFamily:"'Barlow Condensed',sans-serif",fontWeight:600,color:"#4ade80",letterSpacing:3,marginTop:6}}>FULL SCHEDULE — AEST</div>
          <div style={{marginTop:10,fontSize:12,color:"#6b8a72"}}>11 Jun – 19 Jul 2026 · USA, Canada, Mexico · 104 matches · 48 teams · All times AEST (UTC+10)</div>
        </div>
      </div>

      <div style={{maxWidth:820,margin:"0 auto",padding:"0 16px"}}>

        {/* STAGE FILTER */}
        <div style={{marginTop:20,display:"flex",gap:6,flexWrap:"wrap",justifyContent:"center"}}>
          {STAGES_ORDER.map(s => {
            const active = stage === s;
            const meta = s === "All" ? null : STAGE_META[s];
            return (
              <button key={s} className="filter-btn" onClick={() => setStage(s)} style={{
                background: active ? (meta ? meta.color : "#4ade80") : "rgba(255,255,255,0.05)",
                color: active ? "#000" : (meta ? meta.color : "#9ca3af"),
                border:`1px solid ${active ? "transparent" : (meta ? meta.color+"40" : "#2d3a30")}`,
                borderRadius:20,padding:"5px 14px",fontSize:11,
                fontFamily:"'Barlow Condensed',sans-serif",fontWeight:700,letterSpacing:1,textTransform:"uppercase",cursor:"pointer"
              }}>
                {s === "All" ? `ALL (${MATCHES.length})` : s}
              </button>
            );
          })}
        </div>

        {/* SEARCH */}
        <div style={{marginTop:14,position:"relative"}}>
          <input value={search} onChange={e => setSearch(e.target.value)} placeholder="Search team or city…"
            style={{width:"100%",background:"rgba(255,255,255,0.04)",border:"1px solid #1f3323",borderRadius:8,padding:"10px 16px 10px 38px",fontSize:13,fontFamily:"'Barlow',sans-serif"}}/>
          <span style={{position:"absolute",left:13,top:"50%",transform:"translateY(-50%)",color:"#4a6a50",fontSize:15}}>⚽</span>
          {search && <span onClick={() => setSearch("")} style={{position:"absolute",right:12,top:"50%",transform:"translateY(-50%)",color:"#6b7280",cursor:"pointer",fontSize:18,lineHeight:1}}>×</span>}
        </div>

        <div style={{marginTop:8,fontSize:11,color:"#4a6a50",textAlign:"right"}}>{filtered.length} matches shown</div>

        {/* DAY SECTIONS */}
        {[...byDate.entries()].map(([date, games]) => {
          const isKnockout = games.some(g => g.stage !== "Group");
          return (
            <div key={date} style={{marginTop:24}}>
              <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:10}}>
                <div style={{
                  background: isKnockout ? "rgba(251,191,36,0.1)" : "rgba(34,197,94,0.1)",
                  border:`1px solid ${isKnockout ? "#fbbf2440" : "#22c55e40"}`,
                  borderRadius:6,padding:"4px 12px",
                  fontFamily:"'Barlow Condensed',sans-serif",fontWeight:800,
                  fontSize:14,letterSpacing:1,color: isKnockout ? "#fbbf24" : "#4ade80"
                }}>{date}</div>
                <div style={{flex:1,height:1,background:"#1a2e1e"}}/>
                <span style={{fontSize:11,color:"#374a3a"}}>{games.length} game{games.length>1?"s":""}</span>
              </div>

              <div style={{display:"flex",flexDirection:"column",gap:6}}>
                {games.sort((a,b) => a.time.localeCompare(b.time)).map((m,i) => {
                  const meta = STAGE_META[m.stage];
                  const gc = GROUP_COLORS[m.group];
                  const isAus = m.home.includes("Australia") || m.away.includes("Australia");
                  const isArg = m.home.includes("Argentina") || m.away.includes("Argentina");
                  const isSpecial = isAus || isArg;
                  return (
                    <div key={i} className="match-card" style={{
                      background: isSpecial ? "linear-gradient(135deg,rgba(34,197,94,0.08) 0%,rgba(255,255,255,0.03) 100%)" : "rgba(255,255,255,0.03)",
                      border:`1px solid ${isSpecial ? "#22c55e30" : "#1a2e1e"}`,
                      borderLeft:`3px solid ${meta.color}`,
                      borderRadius:8,padding:"10px 14px",
                      display:"flex",alignItems:"center",gap:10
                    }}>
                      <div style={{minWidth:48,fontFamily:"'Barlow Condensed',sans-serif",fontWeight:700,fontSize:16,color:"#e2e8e4",letterSpacing:0.5}}>{m.time}</div>
                      <div style={{background:meta.bg,color:meta.color,border:`1px solid ${meta.color}50`,borderRadius:4,padding:"2px 6px",fontSize:9,fontFamily:"'Barlow Condensed',sans-serif",fontWeight:800,letterSpacing:1,minWidth:30,textAlign:"center"}}>{meta.label}</div>
                      {m.group !== "-" && (
                        <div style={{background:`${gc}18`,color:gc,border:`1px solid ${gc}40`,borderRadius:4,padding:"2px 6px",fontSize:9,fontFamily:"'Barlow Condensed',sans-serif",fontWeight:800,minWidth:24,textAlign:"center"}}>{m.group}</div>
                      )}
                      <div style={{flex:1,display:"flex",alignItems:"center",gap:6,minWidth:0,overflow:"hidden"}}>
                        <span style={{fontFamily:"'Barlow Condensed',sans-serif",fontWeight:700,fontSize:14,color:m.home==="TBD"?"#4a6a50":"#e2e8e4",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{m.home}</span>
                        <span style={{color:"#2d4a32",fontSize:11,fontWeight:700,flexShrink:0}}>vs</span>
                        <span style={{fontFamily:"'Barlow Condensed',sans-serif",fontWeight:700,fontSize:14,color:m.away==="TBD"?"#4a6a50":"#e2e8e4",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{m.away}</span>
                      </div>
                      <div style={{fontSize:10,color:"#4a6a50",whiteSpace:"nowrap",flexShrink:0}}>📍{m.venue}</div>
                    </div>
                  );
                })}
              </div>
            </div>
          );
        })}

        {byDate.size === 0 && (
          <div style={{textAlign:"center",marginTop:60,color:"#4a6a50"}}>
            <div style={{fontSize:40}}>⚽</div>
            <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:20,marginTop:8}}>No matches found</div>
          </div>
        )}

        <div style={{marginTop:40,textAlign:"center",color:"#2d4a32",fontSize:10}}>
          All times AEST (UTC+10) · Sources: Al Jazeera / FIFA · Some TBDs to be confirmed
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
